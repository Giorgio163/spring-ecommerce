spring:
  application:
    name: shop-api

  datasource:
    url: jdbc:postgresql://shop-db:5432/shopdb
    username: shopuser
    password: shoppass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


